plugins {
    id 'application'
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.2'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

application {
    // Starter CLI entrypoint class.
    mainClass = 'wurdal'
}

tasks.named('test') {
    useJUnitPlatform()
}
