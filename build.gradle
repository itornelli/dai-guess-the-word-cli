plugins {
    id 'application'
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.2'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

application {
    // Starter CLI entrypoint class.
    mainClass = 'wurdal'
}

tasks.named('test') {
    useJUnitPlatform()
}

tasks.named('run') {
    group = 'application'
    description = 'Runs the CLI application.'
    standardInput = System.in
}

tasks.named('build') {
    group = 'build'
    description = 'Assembles and tests this project.'
}

tasks.register('bootRun', JavaExec) {
    group = 'application'
    description = 'Runs the CLI application (bootRun-style alias).'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = application.mainClass
    standardInput = System.in
    dependsOn tasks.named('classes')
}
